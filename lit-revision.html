<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lit Revision — AQA English Literature</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE7D9;
    --cream-darker: #E0D8C8;
    --oak: #8B5E3C;
    --oak-light: #A8723F;
    --oak-dark: #5C3D22;
    --amber: #C4832A;
    --amber-light: #E8A84A;
    --amber-pale: #F5D9A8;
    --text-primary: #2C1810;
    --text-secondary: #5C4030;
    --text-muted: #8B7060;
    --correct: #4A7C59;
    --correct-bg: #E8F3EC;
    --wrong: #8B3A3A;
    --wrong-bg: #F3E8E8;
    --card-shadow: 0 2px 12px rgba(44,24,16,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--oak-dark);
    color: #F5F0E8;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(44,24,16,0.25);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  header .subtitle { font-size: 0.75rem; opacity: 0.7; margin-top: 2px; font-style: italic; }
  .header-stats {
    display: flex;
    gap: 1.2rem;
    font-size: 0.78rem;
    opacity: 0.85;
  }
  .header-stats span { display: flex; flex-direction: column; align-items: center; }
  .header-stats strong { font-size: 1.1rem; font-weight: 600; font-family: 'Playfair Display', serif; }

  /* ── Nav ── */
  nav {
    background: var(--cream-dark);
    border-bottom: 1.5px solid var(--cream-darker);
    padding: 0 1rem;
    display: flex;
    overflow-x: auto;
    gap: 0;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 0.75rem 1rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-muted);
    border: none;
    background: none;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2.5px solid transparent;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .nav-tab:hover { color: var(--oak); }
  .nav-tab.active {
    color: var(--oak-dark);
    border-bottom-color: var(--oak);
    font-weight: 600;
  }
  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--amber-light);
    opacity: 0.5;
  }
  .nav-dot.has-mastery { opacity: 1; }

  /* ── Main ── */
  main {
    flex: 1;
    padding: 1.2rem 1rem;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── Home screen ── */
  #home-screen { display: none; }
  #home-screen.visible { display: block; }

  .text-header {
    text-align: center;
    margin-bottom: 1.5rem;
    padding: 1.2rem 1rem;
    background: white;
    border-radius: 12px;
    border: 1px solid var(--cream-darker);
    box-shadow: var(--card-shadow);
  }
  .text-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--oak-dark);
    margin-bottom: 0.25rem;
  }
  .text-header .author { font-size: 0.82rem; color: var(--text-muted); font-style: italic; }
  .text-header .mastery-bar-wrap { margin-top: 0.8rem; }
  .mastery-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
  .mastery-bar {
    height: 6px;
    background: var(--cream-darker);
    border-radius: 3px;
    overflow: hidden;
  }
  .mastery-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), var(--oak));
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
    gap: 0.7rem;
    margin-bottom: 1rem;
  }
  .theme-btn {
    padding: 0.75rem 0.6rem;
    background: white;
    border: 1.5px solid var(--cream-darker);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-align: center;
    transition: all 0.15s;
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }
  .theme-btn:hover { border-color: var(--oak-light); color: var(--oak-dark); transform: translateY(-1px); }
  .theme-btn .count { font-size: 0.7rem; color: var(--text-muted); }
  .theme-btn .mini-bar { width: 100%; height: 3px; background: var(--cream-darker); border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .theme-btn .mini-bar-fill { height: 100%; background: var(--amber); border-radius: 2px; }

  .start-all-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--oak);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-bottom: 0.6rem;
    letter-spacing: 0.02em;
  }
  .start-all-btn:hover { background: var(--oak-dark); transform: translateY(-1px); }
  .start-all-btn:active { transform: scale(0.99); }

  /* ── Flashcard screen ── */
  #card-screen { display: none; }
  #card-screen.visible { display: block; }

  .card-progress {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--cream-darker);
    border-radius: 2px;
    margin: 0 0.75rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--oak);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .card {
    background: white;
    border-radius: 14px;
    border: 1px solid var(--cream-darker);
    box-shadow: var(--card-shadow);
    padding: 1.4rem 1.2rem;
    margin-bottom: 0.9rem;
    min-height: 130px;
  }
  .card-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }
  .card-theme-tag {
    display: inline-block;
    background: var(--amber-pale);
    color: var(--oak-dark);
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-style: italic;
    margin-bottom: 0.6rem;
  }
  .card-prompt {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }
  .card-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
  }
  .blank {
    display: inline-block;
    min-width: 2.75em;
    border-bottom: 2px solid var(--oak);
    color: var(--oak-dark);
    background: var(--amber-pale);
    border-radius: 3px;
    padding: 0 5px;
    user-select: none;
    font-family: 'Source Serif 4', serif;
    font-size: 0.95em;
  }
  .blank.revealed {
    font-style: italic;
    font-weight: 600;
  }
  .card-prompt .quote-cloze-wrap {
    font-family: 'Playfair Display', serif;
  }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex;
    background: var(--cream-dark);
    border-radius: 8px;
    padding: 3px;
    width: fit-content;
    margin: 0 auto 0.9rem;
    gap: 2px;
  }
  .mode-btn {
    padding: 0.35rem 0.85rem;
    border: none;
    background: none;
    border-radius: 6px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn.active { background: white; color: var(--oak-dark); font-weight: 600; box-shadow: 0 1px 4px rgba(44,24,16,0.12); }

  /* ── Multiple choice ── */
  .mc-options { display: flex; flex-direction: column; gap: 0.55rem; }
  .mc-opt {
    padding: 0.75rem 1rem;
    background: white;
    border: 1.5px solid var(--cream-darker);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    color: var(--text-secondary);
    transition: all 0.15s;
    text-align: left;
    line-height: 1.45;
  }
  .mc-opt:hover:not(:disabled) { border-color: var(--oak-light); color: var(--oak-dark); background: var(--cream); }
  .mc-opt.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); font-weight: 600; }
  .mc-opt.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
  .mc-opt:disabled { cursor: default; }

  /* ── Type mode ── */
  .type-area { display: flex; flex-direction: column; gap: 0.6rem; }
  .type-inputs-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    width: 100%;
  }
  .type-blank-row {
    display: flex;
    flex-direction: column;
    gap: 0.28rem;
  }
  .type-blank-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }
  .type-input {
    width: 100%;
    min-height: 2.5rem;
    padding: 0.65rem 0.75rem;
    background: white;
    border: 1.5px solid var(--cream-darker);
    border-radius: 10px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    color: var(--text-primary);
    transition: border-color 0.15s;
    outline: none;
    box-sizing: border-box;
  }
  .type-input:focus { border-color: var(--oak-light); }
  .type-input.correct-input { border-color: var(--correct); background: var(--correct-bg); }
  .type-input.wrong-input { border-color: var(--wrong); background: var(--wrong-bg); }
  .submit-btn {
    padding: 0.65rem;
    background: var(--oak);
    color: var(--cream);
    border: none;
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--oak-dark); }
  .reveal-btn {
    padding: 0.5rem;
    background: none;
    color: var(--text-muted);
    border: 1px solid var(--cream-darker);
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reveal-btn:hover { color: var(--oak); border-color: var(--oak-light); }

  /* ── Analysis panel ── */
  .analysis-panel {
    background: var(--oak-dark);
    color: #F5EFE0;
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 0.9rem;
    display: none;
    animation: slideUp 0.25s ease;
  }
  .analysis-panel.visible { display: block; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .analysis-panel .full-quote {
    display: none;
  }
  .analysis-panel .source { font-size: 0.72rem; opacity: 0.6; margin-bottom: 0.6rem; }
  .analysis-panel .analysis-text {
    font-size: 0.83rem;
    line-height: 1.6;
    opacity: 0.88;
  }
  .analysis-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.65rem; }
  .analysis-tag {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 0.7rem;
    opacity: 0.85;
    font-style: italic;
  }

  .next-btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--oak);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: none;
  }
  .next-btn.visible { display: block; }
  .next-btn:hover { background: var(--oak-dark); }

  .self-mark-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.7rem;
    display: none;
  }
  .self-mark-row.visible { display: flex; }
  .self-mark-yes, .self-mark-no {
    flex: 1;
    padding: 0.55rem;
    border: 1.5px solid;
    border-radius: 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
  }
  .self-mark-yes { border-color: var(--correct); color: var(--correct); }
  .self-mark-yes:hover { background: var(--correct-bg); }
  .self-mark-no { border-color: var(--wrong); color: var(--wrong); }
  .self-mark-no:hover { background: var(--wrong-bg); }

  /* ── Results screen ── */
  #results-screen { display: none; text-align: center; }
  #results-screen.visible { display: block; }
  .results-card {
    background: white;
    border-radius: 14px;
    border: 1px solid var(--cream-darker);
    box-shadow: var(--card-shadow);
    padding: 2rem 1.5rem;
  }
  .results-score {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--oak-dark);
  }
  .results-label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
  .results-breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; margin: 1.2rem 0; }
  .breakdown-stat { background: var(--cream); border-radius: 8px; padding: 0.7rem 0.5rem; }
  .breakdown-stat strong { display: block; font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--oak-dark); }
  .breakdown-stat span { font-size: 0.72rem; color: var(--text-muted); }

  footer { text-align: center; padding: 1rem; font-size: 0.72rem; color: var(--text-muted); font-style: italic; border-top: 1px solid var(--cream-darker); margin-top: auto; }

  @media (max-width: 480px) {
    main { padding: 0.9rem 0.75rem; }
    .card { padding: 1.1rem; }
    .card-prompt { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Lit Revision</h1>
    <div class="subtitle">AQA English Literature — Paper 1 &amp; Anthology</div>
  </div>
  <div class="header-stats">
    <span><strong id="hdr-total">0</strong>cards</span>
    <span><strong id="hdr-mastered">0</strong>mastered</span>
  </div>
</header>

<nav id="main-nav">
  <button class="nav-tab active" data-text="macbeth">
    <span class="nav-dot" id="dot-macbeth"></span>Macbeth
  </button>
  <button class="nav-tab" data-text="acc">
    <span class="nav-dot" id="dot-acc"></span>A Christmas Carol
  </button>
  <button class="nav-tab" data-text="poetry">
    <span class="nav-dot" id="dot-poetry"></span>Power &amp; Conflict
  </button>
  <button class="nav-tab" data-text="aic">
    <span class="nav-dot" id="dot-aic"></span>An Inspector Calls
  </button>
</nav>

<main>
  <div id="home-screen" class="visible">
    <div class="text-header" id="text-header-display"></div>
    <div id="theme-grid-container"></div>
    <button class="start-all-btn" id="start-all-btn">Start All Cards</button>
  </div>

  <div id="card-screen">
    <div class="card-progress">
      <span id="prog-label">1 / 20</span>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
      <span id="streak-label">🔥 0</span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-mc">Multiple Choice</button>
      <button class="mode-btn" id="mode-type">Type It</button>
    </div>
    <div class="card" id="main-card">
      <div class="card-meta" id="card-meta"></div>
      <div class="card-theme-tag" id="card-theme-tag"></div>
      <div class="card-prompt" id="card-prompt"></div>
      <div class="card-hint" id="card-hint"></div>
    </div>
    <div id="mc-container" class="mc-options"></div>
    <div id="type-container" class="type-area" style="display:none">
      <div id="type-inputs-wrap" class="type-inputs-wrap" aria-live="polite"></div>
      <button class="submit-btn" id="submit-type-btn">Check Answer</button>
      <button class="reveal-btn" id="reveal-btn">Show Answer</button>
    </div>
    <div class="self-mark-row" id="self-mark-row">
      <button class="self-mark-yes" id="self-yes">✓ Got it</button>
      <button class="self-mark-no" id="self-no">✗ Not quite</button>
    </div>
    <div class="analysis-panel" id="analysis-panel">
      <div class="full-quote" id="analysis-quote"></div>
      <div class="source" id="analysis-source"></div>
      <div class="analysis-text" id="analysis-text"></div>
      <div class="analysis-tags" id="analysis-tags"></div>
    </div>
    <button class="next-btn" id="next-btn">Next Card →</button>
  </div>

  <div id="results-screen">
    <div class="results-card">
      <div class="results-score" id="res-score">—</div>
      <div class="results-label">Round complete</div>
      <div class="results-breakdown">
        <div class="breakdown-stat"><strong id="res-correct">—</strong><span>Correct</span></div>
        <div class="breakdown-stat"><strong id="res-wrong">—</strong><span>Wrong</span></div>
        <div class="breakdown-stat"><strong id="res-mastered">—</strong><span>Mastered</span></div>
      </div>
      <button class="start-all-btn" id="restart-btn" style="margin-bottom:0.5rem">Try Again</button>
      <button class="start-all-btn" id="home-btn" style="background: var(--oak-dark)">Back to Menu</button>
    </div>
  </div>
</main>

<footer>Best of luck on Paper 1 ✦ Quotes for AQA GCSE English Literature</footer>

<script>
const TEXTS = {
  macbeth: {
    title: "Macbeth",
    author: "William Shakespeare",
    themes: ["Power & Ambition","The Supernatural","Gender & Manipulation","Guilt & Conscience","Appearance vs Reality","Fate & Free Will","Violence & Tyranny"],
    cards: [
      {
        id:"mac1",
        speaker:"Lady Macbeth",
        act:"Act 1, Scene 5",
        quote:"Come, you spirits / That tend on mortal thoughts, unsex me here",
        context:"Lady Macbeth's soliloquy after reading Macbeth's letter",
        prompt:"Come, you spirits / That tend on mortal thoughts, _____ me here",
        blank:"unsex",
        options:["release","unsex","harden","free"],
        answerIndex:1,
        themes:["Gender & Manipulation","The Supernatural","Power & Ambition"],
        analysis:"Lady Macbeth actively rejects femininity, which Shakespeare's audience equated with weakness. The imperative 'unsex me here' is shocking — she invites demonic possession to harden herself. This is the most explicit example of gender as a construct in the play, and links to the Witches' androgynous appearance."
      },
      {
        id:"mac2",
        speaker:"Lady Macbeth",
        act:"Act 1, Scene 5",
        quote:"Stop up the access and passage to remorse",
        context:"Lady Macbeth's soliloquy — she demands her conscience be blocked",
        prompt:"Stop up the access and passage to _____",
        blank:"remorse",
        options:["guilt","remorse","heaven","feeling"],
        answerIndex:1,
        themes:["Guilt & Conscience","Power & Ambition","Gender & Manipulation"],
        analysis:"Ironically prefigures her complete psychological collapse in Act 5. The word 'remorse' is key — she recognises remorse would prevent regicide, yet it is ultimately remorse that destroys her. Shakespeare structures this as a tragic irony the audience can see from the opening."
      },
      {
        id:"mac3",
        speaker:"Macbeth",
        act:"Act 1, Scene 7",
        quote:"I have no spur / To prick the sides of my intent, but only / Vaulting ambition, which o'erleaps itself / And falls on th'other side",
        context:"Macbeth's soliloquy as he weighs up murdering Duncan",
        prompt:"I have no spur / To prick the sides of my intent, but only / Vaulting _____, which o'erleaps itself / And falls on th'other side",
        blank:"ambition",
        options:["desire","hatred","ambition","greed"],
        answerIndex:2,
        themes:["Power & Ambition","Fate & Free Will","Guilt & Conscience"],
        analysis:"The equestrian metaphor ('spur', 'prick') reduces regicide to horsemanship, then shows it collapsing. Macbeth diagnoses his own fatal flaw here — he knows ambition is irrational yet proceeds. This makes him a tragic hero in the classical sense: self-aware but unable to stop."
      },
      {
        id:"mac4",
        speaker:"Witches",
        act:"Act 1, Scene 1",
        quote:"Fair is foul, and foul is fair",
        context:"The Witches' opening chant",
        prompt:"_____ is foul, and foul is fair",
        blank:"Fair",
        options:["Good","Fair","Truth","Light"],
        answerIndex:1,
        themes:["Appearance vs Reality","The Supernatural","Fate & Free Will"],
        analysis:"This chiastic paradox immediately disrupts moral certainty. It functions as the play's thesis statement: nothing is as it appears. Macbeth echoes this exact phrasing when he first appears — 'So foul and fair a day' — subtly linking him to the Witches before they even meet."
      },
      {
        id:"mac5",
        speaker:"Macbeth",
        act:"Act 1, Scene 3",
        quote:"So foul and fair a day I have not seen",
        context:"Macbeth's first words in the play, unknowingly echoing the Witches",

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function escapeRegExp(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}
/** First case-insensitive match of the correct MC answer inside the quote (for cloze). */
function findAnswerInQuote(quote, answer) {
  if (!answer || !quote) return null;
  const re = new RegExp(escapeRegExp(answer), "i");
  const m = re.exec(quote);
  if (!m) return null;
  const i = m.index;
  return { index: i, text: m[0] };
}
const CLOZE_MARKER = "_____";
/** Short words skipped when auto-picking extra type-mode blanks (MC wording unchanged). */
const TYPE_STOP = new Set([
  "the","a","an","and","or","but","if","so","as","at","to","in","on","of","for","with","by","from","up","out","off","over",
  "i","me","my","we","us","our","you","your","he","him","his","she","her","it","its","they","them","their","what","which","who","whom",
  "this","that","these","those","am","is","are","was","were","be","been","being","have","has","had","do","does","did","will","would",
  "shall","should","may","might","must","can","could","not","no","nor","too","very","just","only","own","same","such","than","then",
  "there","here","when","where","why","how","all","each","every","both","few","more","most","other","some","any","into","through",
  "before","after","again","once","o","oh","ay","yes","no"
]);

function mergeNonOverlappingHits(hits) {
  const out = [];
  let lastEnd = -1;
  for (const h of hits) {
    if (h.index < lastEnd) continue;
    out.push(h);
    lastEnd = h.index + h.text.length;
  }
  return out;
}

/** Strings to blank in Type mode: optional card.typeAnswers (2+), else primary + auto-picked words from the quote (up to 3 blanks). */
function getTypeClozeAnswerKeys(card) {
  if (Array.isArray(card.typeAnswers) && card.typeAnswers.length >= 2)
    return card.typeAnswers.slice(0, 3);
  const primary = card.options[card.answerIndex];
  const quote = card.quote;
  const keys = [primary];
  const pHit = findAnswerInQuote(quote, primary);

  function overlapsPrimary(start, end) {
    if (!pHit) return false;
    return !(end <= pHit.index || start >= pHit.index + pHit.text.length);
  }

  function collect(minLen) {
    const re = /[\w']+/g;
    const seen = new Set([primary.toLowerCase()]);
    const found = [];
    let m;
    while ((m = re.exec(quote)) !== null) {
      const raw = m[0];
      const start = m.index;
      const end = start + raw.length;
      if (overlapsPrimary(start, end)) continue;
      const norm = raw.replace(/^['']+|['']+$/g, "").toLowerCase();
      if (norm.length < minLen) continue;
      if (TYPE_STOP.has(norm)) continue;
      if (seen.has(norm)) continue;
      const h = findAnswerInQuote(quote, raw);
      if (!h || h.index !== start) continue;
      seen.add(norm);
      found.push(h);
    }
    found.sort((a, b) => a.index - b.index);
    return found;
  }

  let extra = collect(4);
  if (extra.length < 2) extra = collect(3);
  for (const h of extra) {
    if (keys.length >= 3) break;
    keys.push(h.text);
  }
  return keys;
}

function getTypeClozeHits(card) {
  const quote = card.quote;
  const hits = [];
  for (const t of getTypeClozeAnswerKeys(card)) {
    const h = findAnswerInQuote(quote, t);
    if (h) hits.push(h);
  }
  hits.sort((a, b) => a.index - b.index);
  return mergeNonOverlappingHits(hits);
}

function buildQuoteClozeHtml(card) {
  const p = card.prompt;
  if (typeof p === "string" && p.includes(CLOZE_MARKER)) {
    const parts = p.split(CLOZE_MARKER);
    if (parts.length === 2) {
      return `<span class="quote-cloze-wrap">“${escapeHtml(parts[0])}<span class="blank quote-cloze-blank">${CLOZE_MARKER}</span>${escapeHtml(parts[1])}”</span>`;
    }
  }
  const answer = card.options[card.answerIndex];
  const hit = findAnswerInQuote(card.quote, answer);
  const q = card.quote;
  if (!hit) {
    return `<span class="quote-cloze-wrap">“${escapeHtml(q)}”</span>`;
  }
  const before = escapeHtml(q.slice(0, hit.index));
  const after = escapeHtml(q.slice(hit.index + hit.text.length));
  return `<span class="quote-cloze-wrap">“${before}<span class="blank quote-cloze-blank">${CLOZE_MARKER}</span>${after}”</span>`;
}

function buildTypeClozeHtml(card) {
  const hits = getTypeClozeHits(card);
  const q = card.quote;
  if (!hits.length) {
    return `<span class="quote-cloze-wrap">“${escapeHtml(q)}”</span>`;
  }
  let out = "";
  let pos = 0;
  for (const h of hits) {
    out += escapeHtml(q.slice(pos, h.index));
    out += `<span class="blank quote-cloze-blank">${CLOZE_MARKER}</span>`;
    pos = h.index + h.text.length;
  }
  out += escapeHtml(q.slice(pos));
  return `<span class="quote-cloze-wrap">“${out}”</span>`;
}

function revealClozeBlanks(card) {
  const els = document.querySelectorAll("#card-prompt .quote-cloze-blank");
  if (currentMode === MODE_TYPE) {
    const hits = getTypeClozeHits(card);
    els.forEach((el, i) => {
      const h = hits[i];
      if (h) {
        el.textContent = h.text;
        el.classList.add("revealed");
      }
    });
  } else if (els[0]) {
    const answer = card.options[card.answerIndex];
    const hit = findAnswerInQuote(card.quote, answer);
    els[0].textContent = hit ? hit.text : answer;
    els[0].classList.add("revealed");
  }
}

function typeBlankPairOk(lineVal, hitText) {
  const val = String(lineVal ?? "").trim().toLowerCase();
  const target = hitText.toLowerCase();
  return val.includes(target) || target.includes(val) || levenshtein(val, target) <= 2;
}

function typeModeLinesMatch(lines, hits) {
  if (lines.length !== hits.length) return false;
  for (let i = 0; i < hits.length; i++) {
    if (!typeBlankPairOk(lines[i], hits[i].text)) return false;
  }
  return true;
}

function renderTypeInputs(card) {
  const wrap = document.getElementById("type-inputs-wrap");
  wrap.innerHTML = "";
  const hits = getTypeClozeHits(card);
  const makeRow = (labelText, placeholder) => {
    const row = document.createElement("div");
    row.className = "type-blank-row";
    const lab = document.createElement("span");
    lab.className = "type-blank-label";
    lab.textContent = labelText;
    const inp = document.createElement("input");
    inp.type = "text";
    inp.className = "type-input type-blank-input";
    inp.placeholder = placeholder;
    inp.autocomplete = "off";
    inp.spellcheck = false;
    row.appendChild(lab);
    row.appendChild(inp);
    wrap.appendChild(row);
    return inp;
  };

  if (!hits.length) {
    makeRow("Answer", "Type the missing word or phrase…");
    return;
  }

  const multi = hits.length > 1;
  hits.forEach((_, i) => {
    const label = multi ? `Blank ${i + 1}` : "Answer";
    makeRow(label, "Missing word or phrase…");
  });
}

function getTypeBlankInputs() {
  return [...document.querySelectorAll("#type-inputs-wrap .type-blank-input")];

function getMastery() {
  try { return JSON.parse(localStorage.getItem("litrev_mastery") || "{}"); } catch { return {}; }
}
function setMastery(data) {
  try { localStorage.setItem("litrev_mastery", JSON.stringify(data)); } catch {}
}
function markCard(id, correct) {
  const m = getMastery();
  if (!m[id]) m[id] = { correct: 0, wrong: 0 };
  if (correct) m[id].correct++; else m[id].wrong++;
  setMastery(m);
}
function isMastered(id) {
  const m = getMastery();
  if (!m[id]) return false;
  return m[id].correct >= 3 && m[id].correct > m[id].wrong;
}

function updateHeaderStats() {
  let total = 0, mastered = 0;
  Object.values(TEXTS).forEach(t => {
    t.cards.forEach(c => {
      total++;
      if (isMastered(c.id)) mastered++;
    });
  });
  document.getElementById("hdr-total").textContent = total;
  document.getElementById("hdr-mastered").textContent = mastered;
}

function getMasteryPct(cards) {
  if (!cards.length) return 0;
  return Math.round(cards.filter(c => isMastered(c.id)).length / cards.length * 100);
}

    </div>
  `;

  const themes = text.themes;
  const grid = document.getElementById("theme-grid-container");
  const m = getMastery();
  let html = '<div class="theme-grid">';
  themes.forEach(th => {
    const matching = text.cards.filter(c => c.themes.includes(th));
    const masteredCount = matching.filter(c => isMastered(c.id)).length;
    const thPct = matching.length ? Math.round(masteredCount / matching.length * 100) : 0;
    html += `<button class="theme-btn" onclick="startTheme('${encodeURIComponent(th)}')">
      <span>${th}</span>
      <span class="count">${matching.length} quotes</span>
      <div class="mini-bar"><div class="mini-bar-fill" style="width:${thPct}%"></div></div>
    </button>`;
  });
  html += '</div>';
  grid.innerHTML = html;
}

function updateNavDots() {
  Object.keys(TEXTS).forEach(key => {
    const pct = getMasteryPct(TEXTS[key].cards);
    const dot = document.getElementById("dot-" + key);
    if (dot) dot.classList.toggle("has-mastery", pct > 0);
  });
}

function startTheme(encodedTheme) {
  const theme = decodeURIComponent(encodedTheme);
  const cards = TEXTS[currentText].cards.filter(c => c.themes.includes(theme));
  startSession(cards);
}

function startSession(cards) {
  const shuffled = [...cards].sort(() => Math.random() - 0.5);
  currentQueue = shuffled;
  currentIndex = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  streak = 0;
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("results-screen").style.display = "none";
  document.getElementById("card-screen").style.display = "block";
  document.getElementById("card-screen").classList.add("visible");
  showCard();
}

function showCard() {
  if (currentIndex >= currentQueue.length) {
    showResults();
    return;
  }
  answered = false;
  const card = currentQueue[currentIndex];
  const total = currentQueue.length;
  const pct = Math.round(currentIndex / total * 100);

  document.getElementById("prog-label").textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("streak-label").textContent = streak > 1 ? `🔥 ${streak}` : "";
  document.getElementById("card-meta").textContent = `${card.speaker} — ${card.act}`;
  document.getElementById("card-theme-tag").textContent = card.themes[0];
  document.getElementById("card-prompt").innerHTML =
    currentMode === MODE_TYPE ? buildTypeClozeHtml(card) : buildQuoteClozeHtml(card);
  document.getElementById("card-hint").textContent = `"${card.context}"`;

  document.getElementById("analysis-panel").classList.remove("visible");
  document.getElementById("next-btn").classList.remove("visible");
  document.getElementById("self-mark-row").classList.remove("visible");

  if (currentMode === MODE_MC) {
    document.getElementById("mc-container").style.display = "flex";
    document.getElementById("type-container").style.display = "none";
    renderMC(card);
  } else {
    document.getElementById("mc-container").style.display = "none";
    document.getElementById("type-container").style.display = "flex";
    document.getElementById("self-mark-row").classList.remove("visible");
    renderTypeInputs(card);
  }
}

function renderMC(card) {
  const opts = [...card.options].sort(() => Math.random() - 0.5);
  const container = document.getElementById("mc-container");
  container.innerHTML = "";
  opts.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "mc-opt";
    btn.textContent = `"${opt}"`;
    btn.onclick = () => handleMCAnswer(card, opt, btn, container);
    container.appendChild(btn);
  });
}

function handleMCAnswer(card, chosen, btn, container) {
  if (answered) return;
  answered = true;
  const correct = chosen === card.options[card.answerIndex];
  if (correct) { sessionCorrect++; streak++; } else { sessionWrong++; streak = 0; }
  markCard(card.id, correct);
  [...container.children].forEach(b => {
    b.disabled = true;
    if (b.textContent === `"${card.options[card.answerIndex]}"`) b.classList.add("correct");
    else if (b === btn && !correct) b.classList.add("wrong");
  });
  showAnalysis(card);
  document.getElementById("next-btn").classList.add("visible");
  updateHeaderStats();
}

function handleTypeSubmit() {
  if (answered) return;
  const card = currentQueue[currentIndex];
  const hits = getTypeClozeHits(card);
  const inputs = getTypeBlankInputs();
  let close;

  if (!hits.length) {
    const val = (inputs[0]?.value ?? "").trim().toLowerCase();
    const target = card.options[card.answerIndex].toLowerCase();
    close = val.includes(target) || target.includes(val) || levenshtein(val, target) <= 2;
    inputs.forEach(inp => {
      inp.classList.remove("correct-input", "wrong-input");
      inp.classList.add(close ? "correct-input" : "wrong-input");
    });
  } else {
    const lines = inputs.map(inp => inp.value.trim());
    close = typeModeLinesMatch(lines, hits);
    inputs.forEach((inp, i) => {
      inp.classList.remove("correct-input", "wrong-input");
      const ok = i < hits.length && typeBlankPairOk(lines[i], hits[i].text);
      inp.classList.add(ok ? "correct-input" : "wrong-input");
    });
  }

  answered = true;
  if (close) { sessionCorrect++; streak++; } else { sessionWrong++; streak = 0; }
  markCard(card.id, close);
  showAnalysis(card);
  if (!close) {
    document.getElementById("self-mark-row").classList.add("visible");
  } else {
    document.getElementById("next-btn").classList.add("visible");
  }
  updateHeaderStats();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function handleReveal() {
  if (answered) return;
  const card = currentQueue[currentIndex];
  answered = true;
  sessionWrong++;
  streak = 0;
  markCard(card.id, false);
  const hits = getTypeClozeHits(card);
  const inputs = getTypeBlankInputs();
  if (!hits.length) {
    if (inputs[0]) {
      inputs[0].value = card.options[card.answerIndex];
      inputs[0].classList.add("wrong-input");
    }
  } else {
    hits.forEach((h, i) => {
      if (inputs[i]) {
        inputs[i].value = h.text;
        inputs[i].classList.add("wrong-input");
      }
    });
  }
  showAnalysis(card);
  document.getElementById("next-btn").classList.add("visible");
  updateHeaderStats();
}

function showAnalysis(card) {
  revealClozeBlanks(card);
  const panel = document.getElementById("analysis-panel");
  document.getElementById("analysis-quote").textContent = "";
  document.getElementById("analysis-source").textContent = `${card.speaker} · ${card.act}`;
  document.getElementById("analysis-text").textContent = card.analysis;
  const tagsEl = document.getElementById("analysis-tags");
  tagsEl.innerHTML = card.themes.map(t => `<span class="analysis-tag">${t}</span>`).join("");
  panel.classList.add("visible");
}

function showResults() {
  document.getElementById("card-screen").style.display = "none";
  document.getElementById("card-screen").classList.remove("visible");
  document.getElementById("results-screen").style.display = "block";
  document.getElementById("results-screen").classList.add("visible");
  const total = sessionCorrect + sessionWrong;
  const pct = total ? Math.round(sessionCorrect / total * 100) : 0;
  const masteredCount = currentQueue.filter(c => isMastered(c.id)).length;
  document.getElementById("res-score").textContent = pct + "%";
  document.getElementById("res-correct").textContent = sessionCorrect;
  document.getElementById("res-wrong").textContent = sessionWrong;
  document.getElementById("res-mastered").textContent = masteredCount;
  updateHeaderStats();
}

// Nav
document.querySelectorAll(".nav-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentText = btn.dataset.text;
    showHome();
  });
});

document.getElementById("start-all-btn").addEventListener("click", () => {
  startSession(TEXTS[currentText].cards);
});

document.getElementById("next-btn").addEventListener("click", () => {
  currentIndex++;
  showCard();
});

document.getElementById("restart-btn").addEventListener("click", () => {
  startSession(currentQueue);
});
document.getElementById("home-btn").addEventListener("click", showHome);

document.getElementById("mode-mc").addEventListener("click", () => {
  currentMode = MODE_MC;
  document.getElementById("mode-mc").classList.add("active");
  document.getElementById("mode-type").classList.remove("active");
  if (!answered) showCard();
});
document.getElementById("mode-type").addEventListener("click", () => {
  currentMode = MODE_TYPE;
  document.getElementById("mode-type").classList.add("active");
  document.getElementById("mode-mc").classList.remove("active");
  if (!answered) showCard();
});

document.getElementById("submit-type-btn").addEventListener("click", handleTypeSubmit);
document.getElementById("reveal-btn").addEventListener("click", handleReveal);
document.getElementById("type-container").addEventListener("keydown", e => {
  if (!e.target.classList.contains("type-blank-input")) return;
  if (e.key === "Enter" && e.ctrlKey) handleTypeSubmit();
});

document.getElementById("self-yes").addEventListener("click", () => {
  sessionCorrect++;
  sessionWrong = Math.max(0, sessionWrong - 1);
  const card = currentQueue[currentIndex];
  markCard(card.id, true);
  document.getElementById("self-mark-row").classList.remove("visible");
  document.getElementById("next-btn").classList.add("visible");
  updateHeaderStats();
});
document.getElementById("self-no").addEventListener("click", () => {
  document.getElementById("self-mark-row").classList.remove("visible");
  document.getElementById("next-btn").classList.add("visible");
});

showHome();
</script>
